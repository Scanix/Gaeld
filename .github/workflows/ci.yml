name: CI

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

jobs:
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: gaeld
          POSTGRES_PASSWORD: password
          POSTGRES_DB: gaeld_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Secret scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_pgsql, redis, mbstring, xml, curl, zip
          coverage: pcov

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment file
        run: cp .env.example .env

      - name: Generate application key
        run: php artisan key:generate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@latest --activate

      - name: Install NPM dependencies
        run: pnpm install

      - name: Build Vite assets
        run: pnpm build

      - name: Run linter (Pint)
        run: composer lint

      - name: Run static analysis (PHPStan)
        run: composer stan

      - name: Audit Composer dependencies
        continue-on-error: true
        run: composer audit --no-dev

      - name: Audit NPM dependencies
        run: pnpm audit --prod || true

      - name: Run migrations
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: gaeld_test
          DB_USERNAME: gaeld
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: gaeld_test
          DB_USERNAME: gaeld
          DB_PASSWORD: password
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
        run: php artisan test --coverage-clover coverage/clover.xml

      - name: Coverage summary
        if: always()
        run: |
          if [ -f coverage/clover.xml ]; then
            total=$(grep -oP 'statements="\K[0-9]+' coverage/clover.xml | head -1)
            covered=$(grep -oP 'coveredstatements="\K[0-9]+' coverage/clover.xml | head -1)
            if [ "$total" -gt 0 ]; then
              pct=$(echo "scale=1; $covered * 100 / $total" | bc)
              echo "### Code Coverage: ${pct}%" >> $GITHUB_STEP_SUMMARY
              echo "Covered ${covered} of ${total} statements" >> $GITHUB_STEP_SUMMARY
            fi
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/clover.xml
          retention-days: 14
