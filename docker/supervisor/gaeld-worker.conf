[program:gaeld-worker]
process_name=%(program_name)s_%(process_num)02d
command=php /data/www/gaeld_app/current/artisan queue:work redis --sleep=3 --tries=3 --max-time=3600 --queue=default
directory=/data/www/gaeld_app/current
autostart=true
autorestart=true
stopasgroup=true
killasgroup=true
user=deploy
numprocs=2
redirect_stderr=true
stdout_logfile=/data/www/gaeld_app/shared/storage/logs/worker.log
stopwaitsecs=3600
